name: Fix geometry.json Encoding

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fix-encoding:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inspect file
        run: |
          file geometry.json || true
          ls -la geometry.json || true
          head -n 30 geometry.json || true

      - name: Fix encoding (safe UTF-8 conversion)
        run: |
          set -e

          # いったんUTF-8として正規化を試す
          tmpfile="geometry.tmp.json"

          if iconv -f UTF-8 -t UTF-8 geometry.json -o "$tmpfile" 2>/dev/null; then
            mv "$tmpfile" geometry.json
          else
            # UTF-8失敗時はバイトを強制的にUTF-8へ寄せる
            iconv -f ISO-8859-1 -t UTF-8//IGNORE geometry.json -o "$tmpfile" || true
            mv "$tmpfile" geometry.json
          fi

      - name: Validate JSON
        run: |
          python3 -m json.tool geometry.json

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add geometry.json
          git commit -m "fix: geometry.json encoding" || echo "No changes"

          git push origin main
