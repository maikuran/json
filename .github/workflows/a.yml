name: Fix geometry.json Encoding

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect file
        run: |
          echo "=== file ==="
          file geometry.json || true

          echo "=== size ==="
          wc -c geometry.json || true

          echo "=== head ==="
          head -n 50 geometry.json || true

      - name: Guard: empty file check
        run: |
          if [ ! -s geometry.json ]; then
            echo "ERROR: geometry.json is empty"
            exit 1
          fi

      - name: Normalize encoding (safe)
        run: |
          python3 -c "p='geometry.json'; b=open(p,'rb').read(); t=b.decode('utf-8','ignore'); open(p,'w',encoding='utf-8').write(t)"

      - name: Validate JSON (show error)
        run: |
          python3 -m json.tool geometry.json

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add geometry.json
          git commit -m "fix: normalize geometry.json" || echo "no changes"

      - name: Push to main
        run: |
          git push origin main
