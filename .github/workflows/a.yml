name: Fix geometry.json Encoding

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fix-encoding:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inspect file before fix
        run: |
          file geometry.json || true
          ls -la geometry.json || true
          head -n 20 geometry.json || true

      - name: Fix encoding safely
        run: |
          set -e

          # まずUTF-8として壊れていないか確認しつつ再保存
          if iconv -f UTF-8 -t UTF-8 geometry.json -o geometry.tmp.json 2>/dev/null; then
            mv geometry.tmp.json geometry.json
          else
            # フォールバック（不正文字を除去）
            LC_ALL=C sed -i 's/[^[:print:]\t]//g' geometry.json
          fi

      - name: Validate JSON (verbose)
        run: |
          python3 -m json.tool geometry.json

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add geometry.json

          git commit -m "fix: repair geometry.json encoding" || echo "No changes to commit"

      - name: Push to main
        run: |
          git push origin main          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add geometry.json
          git commit -m "fix: geometry.json encoding issue" || echo "No changes to commit"
          git push origin fix-geometry-encoding || true

      - name: Push to main branch
        run: |
          git fetch origin main
          git checkout main
          git add geometry.json
          git commit -m "fix: geometry.json encoding issue (main)" || echo "No changes to commit"
          git push origin main        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: geometry.jsonの文字化けを修正"
          title: "Fix: geometry.jsonの文字化けを修正"
          body: |
            This PR fixes the encoding issue in geometry.json
            - Converts file to UTF-8 encoding
            - Verifies JSON validity
          branch: fix-geometry-encoding
          delete-branch: true
