name: Fix geometry.json Encoding

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug file
        run: |
          file geometry.json || true
          ls -la geometry.json || true
          head -n 30 geometry.json || true

      - name: Normalize encoding (Python inline, no EOF)
        run: python3 -c "import io; p='geometry.json'; d=open(p,'rb').read().decode('utf-8','ignore'); open(p,'w',encoding='utf-8').write(d)"

      - name: Validate JSON
        run: python3 -m json.tool geometry.json

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add geometry.json
          git commit -m "fix: normalize geometry.json encoding" || echo "no changes"

      - name: Push to main
        run: git push origin main
