name: Fix geometry.json Encoding

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inspect file (line-level debug)
        run: |
          echo "=== file ==="
          file geometry.json || true

          echo "=== size ==="
          wc -c geometry.json || true

          echo "=== line 1-50 ==="
          nl -ba geometry.json | sed -n '1,60p' || true

      - name: Extract problem line (28)
        run: |
          echo "=== line 28 ==="
          sed -n '28p' geometry.json || true

      - name: Safe normalize encoding
        run: |
          python3 -c "p='geometry.json'; b=open(p,'rb').read(); t=b.decode('utf-8','ignore'); open(p,'w',encoding='utf-8').write(t)"

      - name: Validate JSON (show full error)
        run: |
          python3 -m json.tool geometry.json

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add geometry.json
          git commit -m "fix: geometry.json encoding cleanup" || echo "no changes"

      - name: Push to main
        run: |
          git push origin main
